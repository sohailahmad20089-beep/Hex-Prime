<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS Ultra - Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0081ff; --bg: #f4f7fa; --dark: #1e293b; --green: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .screen { display: none; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .active { display: block; }
        .brand-name { font-size: 32px; font-weight: 900; color: var(--blue); text-decoration: underline; padding: 40px 20px; text-align: center; }
        .big-input { width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; box-sizing: border-box; margin-bottom: 12px; font-size: 15px; outline: none; }
        .btn-blue { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--blue); color: white; font-weight: 700; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: #fff; padding: 12px; border-radius: 12px; border: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        .admin-header { background: var(--dark); color: white; padding: 20px; border-radius: 0 0 20px 20px; }
        .admin-tool { background: #f8fafc; border: 1px solid #e2e8f0; margin: 15px; padding: 15px; border-radius: 15px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; font-size: 11px; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--blue); font-weight: 700; }
        .history-item { border-bottom: 1px solid #f1f5f9; padding: 12px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="brand-name">Growfansite</div>
        <div style="padding: 0 20px;">
            <input type="text" id="l-user" class="big-input" placeholder="Username">
            <input type="password" id="l-pass" class="big-input" placeholder="Password">
            <button class="btn-blue" onclick="doLogin()">Sign In</button>
            <p style="text-align:center; margin-top:15px;" onclick="toggleScreen('signup-screen')">New? Create Account</p>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div class="brand-name">Register</div>
        <div style="padding: 0 20px;">
            <input type="text" id="s-user" class="big-input" placeholder="Username">
            <input type="password" id="s-pass" class="big-input" placeholder="Password">
            <button class="btn-blue" onclick="doSignup()">Sign Up</button>
            <p style="text-align:center; margin-top:15px;" onclick="toggleScreen('login-screen')">Back to Login</p>
        </div>
    </div>

    <div id="user-panel" class="screen">
        <div style="padding:20px; background:var(--blue); color:white; border-radius:0 0 20px 20px;">
            <small id="displayUser"></small>
            <h2 style="margin:5px 0;">₹<span id="u-bal">0.00</span></h2>
            <div style="display:flex; gap:20px; font-size:12px; opacity:0.9;">
                <span>Spent: ₹<span id="u-spent">0.00</span></span>
                <span>Orders: <span id="u-orders">0</span></span>
            </div>
        </div>

        <div id="order-tab" class="tab-content" style="padding:15px;">
            <label style="font-size:12px; font-weight:700;">Select Service</label>
            <select id="srvSelect" class="big-input" onchange="calcPrice()">
                <option value="0.07" data-id="1798">Insta Views (Ultra Fast)</option>
                <option value="6.15" data-id="3841">Insta Real Likes</option>
                <option value="25.56" data-id="3165">Insta Followers (HQ)</option>
            </select>
            <input type="text" id="orderLink" class="big-input" placeholder="Profile/Video Link">
            <input type="number" id="orderQty" class="big-input" placeholder="Quantity (Min 100)" oninput="calcPrice()">
            <div style="background:#f0f7ff; padding:15px; border-radius:12px; text-align:center; margin-bottom:15px;">
                <small>You Pay:</small><br><b style="font-size:24px; color:var(--blue);" id="p-disp">₹0.00</b>
            </div>
            <button class="btn-blue" onclick="placeOrder()">Place Order</button>
        </div>

        <div id="history-tab" class="tab-content" style="display:none; padding:15px;">
            <h3>Your Activity</h3>
            <div id="history-list"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="showTab('order-tab', this)"><i class="fas fa-shopping-cart"></i><br>Order</div>
            <div class="nav-item" onclick="showTab('history-tab', this); renderHistory()"><i class="fas fa-history"></i><br>History</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i><br>Logout</div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div class="admin-header">
            <h3>Admin Master Control</h3>
            <div class="stats-grid" style="padding:0;">
                <div><small>Users</small><br><b id="adm-users">0</b></div>
                <div><small>Total Bal</small><br><b id="adm-bal">₹0</b></div>
            </div>
        </div>

        <div class="admin-tool">
            <label><b>Profit Margin: <span id="margin-val">50</span>%</b></label>
            <input type="range" id="margin-slider" min="10" max="100" value="50" style="width:100%; margin:10px 0;" oninput="updateMargin()">
            <p style="font-size:10px; color:#64748b;">(Example: If MRSMM price is ₹10, User will see ₹15 at 50% margin)</p>
        </div>

        <div class="admin-tool">
            <label><b>Add Balance to User</b></label>
            <input type="text" id="adm-target-user" class="big-input" placeholder="Target Username" style="margin-top:10px;">
            <input type="number" id="adm-amount" class="big-input" placeholder="Amount (₹)">
            <button onclick="addBalanceAdmin()" class="btn-blue" style="background:var(--green);">Add Cash ✅</button>
        </div>

        <button class="btn-blue" style="background:#64748b; margin:15px; width:90%;" onclick="location.reload()">Exit Admin</button>
    </div>

    <script>
        const API_URL = "https://mrsmm.org/api/v2";
        const API_KEY = "adb83355244cecd3cdceff120d499460";

        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let logs = JSON.parse(localStorage.getItem('smm_logs')) || [];
        let config = JSON.parse(localStorage.getItem('smm_config')) || { margin: 1.5 }; // 1.5 means 50%
        let sessionUser = null;

        function save() { 
            localStorage.setItem('smm_db', JSON.stringify(db)); 
            localStorage.setItem('smm_logs', JSON.stringify(logs));
            localStorage.setItem('smm_config', JSON.stringify(config));
        }

        // --- ADMIN FUNCTIONS ---
        function updateMargin() {
            let val = document.getElementById('margin-slider').value;
            document.getElementById('margin-val').innerText = val;
            config.margin = 1 + (val / 100);
            save();
        }

        function addBalanceAdmin() {
            let target = document.getElementById('adm-target-user').value.trim();
            let amt = Number(document.getElementById('adm-amount').value);
            if(db[target] && amt > 0) {
                db[target].bal += amt;
                save();
                renderAdmin();
                alert(`Added ₹${amt} to ${target}'s account!`);
            } else { alert("User not found!"); }
        }

        function renderAdmin() {
            let keys = Object.keys(db);
            let total = 0;
            keys.forEach(k => total += db[k].bal);
            document.getElementById('adm-users').innerText = keys.length;
            document.getElementById('adm-bal').innerText = "₹" + total.toFixed(2);
            document.getElementById('margin-slider').value = (config.margin - 1) * 100;
            document.getElementById('margin-val').innerText = (config.margin - 1) * 100;
        }

        // --- USER FUNCTIONS ---
        function calcPrice() {
            let baseRate = document.getElementById('srvSelect').value;
            let qty = document.getElementById('orderQty').value || 0;
            let userRate = baseRate * config.margin; // Applying Profit Margin
            document.getElementById('p-disp').innerText = "₹" + ((userRate / 1000) * qty).toFixed(2);
        }

        async function placeOrder() {
            let cost = Number(document.getElementById('p-disp').innerText.replace('₹',''));
            let link = document.getElementById('orderLink').value;
            let qty = Number(document.getElementById('orderQty').value);
            let srvEl = document.getElementById('srvSelect');
            let srvID = srvEl.options[srvEl.selectedIndex].getAttribute('data-id');

            if(!link || qty < 100) return alert("Fill link & Min 100 qty!");
            if(db[sessionUser].bal < cost) return alert("Low Balance!");

            db[sessionUser].bal -= cost;
            db[sessionUser].spent += cost;
            db[sessionUser].orders = (db[sessionUser].orders || 0) + 1;

            try {
                let params = new URLSearchParams({ key: API_KEY, action: 'add', service: srvID, link: link, quantity: qty });
                let res = await fetch(API_URL, { method: 'POST', body: params });
                let data = await res.json();
                if(data.order) {
                    logs.unshift({ id: data.order, user: sessionUser, desc: srvEl.options[srvEl.selectedIndex].text, amt: cost, date: new Date().toLocaleString() });
                    save(); updateUI(); alert("Order Success! ID: " + data.order);
                } else {
                    db[sessionUser].bal += cost; alert("Error: " + data.error);
                }
            } catch(e) { alert("API Error!"); }
        }

        // --- CORE FUNCTIONS ---
        function doLogin() {
            let u = document.getElementById('l-user').value.trim(), p = document.getElementById('l-pass').value.trim();
            if(u === "admin" && p === "suhel7388") { renderAdmin(); toggleScreen('admin-panel'); return; }
            if(db[u] && db[u].pass === p) { sessionUser = u; updateUI(); toggleScreen('user-panel'); }
            else { alert("Wrong login!"); }
        }

        function doSignup() {
            let u = document.getElementById('s-user').value.trim(), p = document.getElementById('s-pass').value.trim();
            if(u && p) { db[u] = {pass:p, bal:0, spent:0, orders:0}; save(); alert("Account Created!"); toggleScreen('login-screen'); }
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = db[sessionUser].bal.toFixed(2);
            document.getElementById('u-spent').innerText = (db[sessionUser].spent || 0).toFixed(2);
            document.getElementById('u-orders').innerText = db[sessionUser].orders || 0;
            document.getElementById('displayUser').innerText = "Account: " + sessionUser;
        }

        function toggleScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showTab(id, el) { document.querySelectorAll('.tab-content').forEach(t => t.style.display='none'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).style.display='block'; el.classList.add('active'); }
        function renderHistory() {
            let uLogs = logs.filter(l => l.user === sessionUser);
            document.getElementById('history-list').innerHTML = uLogs.map(l => `<div class="history-item"><b>${l.desc}</b><br><small>₹${l.amt} | ${l.date} | ID: ${l.id}</small></div>`).join('') || "No orders.";
        }
    </script>
</body>
</html>
