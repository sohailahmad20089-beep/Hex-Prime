<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Ultimate Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --success: #10b981; --warning: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .screen { display: none; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; }
        .active { display: block; }
        .card { background: #fff; margin: 12px; padding: 18px; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 12px; outline: none; font-family: inherit; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; }
        
        /* History Box Style */
        .history-item { border-left: 4px solid var(--primary); padding: 10px; margin-bottom: 10px; background: #f8fafc; border-radius: 8px; font-size: 12px; }
        .badge { padding: 3px 7px; border-radius: 5px; font-size: 10px; font-weight: 700; float: right; }
        .pending { background: #fef3c7; color: #b45309; }
        .success { background: #dcfce7; color: #15803d; }

        .bottom-nav { display: flex; background: #fff; padding: 12px 0; border-top: 1px solid #f1f5f9; position: fixed; bottom: 0; width: 100%; max-width: 500px; z-index: 100; justify-content: space-around; }
        .nav-item { text-align: center; font-size: 10px; font-weight: 700; color: #94a3b8; cursor: pointer; }
        .nav-item.active-nav { color: var(--primary); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }
        
        .admin-tab-btn { flex:1; padding:10px; border:none; background:#f1f5f9; font-weight:700; cursor:pointer; }
        .active-admin-tab { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="padding: 60px 20px; text-align: center;">
            <h1 style="color:var(--primary); font-size:35px;">SMMbyAS</h1>
            <div class="card">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-main" onclick="doLogin()">Login</button>
                <p onclick="toggleScreen('signup-screen')" style="margin-top:15px; cursor:pointer; font-weight:700; color:var(--primary);">Register Now</p>
            </div>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div style="padding: 40px 20px;">
            <h2 style="text-align:center;">Create Account</h2>
            <div class="card">
                <input type="text" id="s-user" placeholder="Username">
                <input type="email" id="s-gmail" placeholder="Gmail">
                <input type="password" id="s-pass" placeholder="Password">
                <button class="btn-main" onclick="doSignup()">Sign Up</button>
                <p onclick="toggleScreen('login-screen')" style="text-align:center; margin-top:15px; cursor:pointer;">Back</p>
            </div>
        </div>
    </div>

    <div id="user-panel" class="screen">
        <div style="padding: 20px; background: var(--primary); color: white; border-radius: 0 0 25px 25px;">
            <small>Welcome,</small> <h2 id="displayUser" style="margin:0;">User</h2>
            <div style="display:flex; gap:20px; margin-top:10px;">
                <div><small>Balance</small><br><b id="userBalDisplay">₹0</b></div>
                <div><small>Spent</small><br><b id="userSpentDisplay">₹0</b></div>
            </div>
        </div>

        <div id="order-tab" class="tab-content" style="padding: 10px;">
            <div class="card">
                <select id="serviceSelect" onchange="calculatePrice()">
                    <option value="0" data-rate="0">Select Service</option>
                    <option value="65" data-rate="65">Instagram Followers - ₹65</option>
                    <option value="2" data-rate="2">Instagram Views - ₹2</option>
                </select>
                <input type="text" id="orderLink" placeholder="Link">
                <input type="number" id="orderQty" placeholder="Quantity" oninput="calculatePrice()">
                <h3 id="finalPriceDisplay" style="text-align:center; color:var(--primary);">₹0.00</h3>
                <button class="btn-main" onclick="handlePlaceOrder()">Order Now</button>
            </div>
        </div>

        <div id="funds-tab" class="tab-content" style="display:none; padding: 10px;">
            <div class="card">
                <input type="number" id="payAmount" placeholder="Amount (₹)" oninput="updateQR()">
                <div id="qrBox" style="display:none; text-align:center; margin:10px;"><img id="qrImg" style="width:150px; border:3px solid #eee; border-radius:10px;"></div>
                <input type="text" id="payTxn" placeholder="UTR / Txn ID">
                <button class="btn-main" style="background:var(--success)" onclick="submitFundRequest()">Submit Payment</button>
            </div>
            <div id="userHistoryList" style="padding:10px;"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active-nav" onclick="showTab('order-tab', this)"><i class="fas fa-plus-circle"></i>New</div>
            <div class="nav-item" onclick="showTab('funds-tab', this); loadUserHistory()"><i class="fas fa-history"></i>History</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>Exit</div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div style="background:#1e293b; color:white; padding:20px;">
            <h3>Admin Panel</h3>
            <div style="display:flex; justify-content:space-around; font-size:12px;">
                <span>Users: <b id="a-tu">0</b></span> <span>Bal: <b id="a-tb">0</b></span>
            </div>
        </div>
        <div style="display:flex;">
            <button class="admin-tab-btn active-admin-tab" onclick="showAdminTab('adm-users', this)">Users</button>
            <button class="admin-tab-btn" onclick="showAdminTab('adm-funds', this)">Payments 🔔</button>
        </div>

        <div id="adm-users" class="adm-section" style="padding:10px;">
            <div class="card" style="overflow-x:auto;">
                <table style="width:100%; font-size:12px; border-collapse:collapse;">
                    <thead><tr style="text-align:left; background:#f1f5f9;"><th>User</th><th>Pass</th><th>Bal</th><th>Action</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
            <div class="card">
                <h4>Manual Balance Add</h4>
                <input type="text" id="admUser" placeholder="Username">
                <input type="number" id="admAmt" placeholder="Amount">
                <button class="btn-main" onclick="adminAddBal()">Add Now</button>
            </div>
        </div>

        <div id="adm-funds" class="adm-section" style="display:none; padding:10px;">
            <div id="adminFundReqList"></div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSXf_2hF77qbtFkLuqkrGt5qb9HEVtGmQqcesvkM9gdxF_hE_jf5jIBmnmXrQyiwf50A/exec";
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let logs = JSON.parse(localStorage.getItem('smm_logs')) || []; // Orders + Funds mix history
        let sessionUser = null;

        // --- AUTH ---
        function doSignup() {
            let u = document.getElementById('s-user').value.trim(), p = document.getElementById('s-pass').value, g = document.getElementById('s-gmail').value;
            if(!u || !p || db[u]) return alert("Username error!");
            db[u] = { pass: p, gmail: g, bal: 0, spent: 0 };
            saveAll(); toggleScreen('login-screen');
        }

        function doLogin() {
            let u = document.getElementById('l-user').value.trim(), p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "suhel7388") { toggleScreen('admin-panel'); loadAdminData(); return; }
            if(db[u] && db[u].pass === p) { sessionUser = u; updateUI(); toggleScreen('user-panel'); } else alert("Wrong Login!");
        }

        // --- ORDERS (TO SHEETS) ---
        function calculatePrice() {
            let rate = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].getAttribute('data-rate');
            let qty = document.getElementById('orderQty').value;
            document.getElementById('finalPriceDisplay').innerText = "₹" + ((rate/1000)*qty).toFixed(2);
        }

        function handlePlaceOrder() {
            let cost = Number(document.getElementById('finalPriceDisplay').innerText.replace('₹',''));
            let link = document.getElementById('orderLink').value, qty = document.getElementById('orderQty').value;
            let srv = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text;

            if(!link || qty < 10 || cost <= 0) return alert("Details bharein!");
            if(db[sessionUser].bal < cost) return alert("Low Balance!");

            db[sessionUser].bal -= cost; db[sessionUser].spent += cost;
            logs.unshift({ type: "ORDER", user: sessionUser, desc: srv, amt: cost, status: "Success", date: new Date().toLocaleString() });
            
            // Send to Google Sheets
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "ORDER", user: sessionUser, service: srv, link: link, qty: qty, cost: cost }) });

            saveAll(); updateUI(); alert("Order Placed & Sent to Sheets!");
        }

        // --- FUNDS (ADMIN APPROVAL) ---
        function updateQR() {
            let a = document.getElementById('payAmount').value;
            document.getElementById('qrBox').style.display = a >= 1 ? "block" : "none";
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=7388720012@fam%26am=${a}%26cu=INR`;
        }

        function submitFundRequest() {
            let a = Number(document.getElementById('payAmount').value), t = document.getElementById('payTxn').value;
            if(a < 1 || t.length < 10) return alert("Sahi Details!");
            logs.unshift({ type: "FUND", user: sessionUser, desc: "Add Money Request", amt: a, utr: t, status: "Pending", date: new Date().toLocaleString() });
            saveAll(); alert("Request Sent! Admin will verify.");
            document.getElementById('payAmount').value = ""; document.getElementById('payTxn').value = "";
        }

        // --- HISTORY ---
        function loadUserHistory() {
            let cont = document.getElementById('userHistoryList'); cont.innerHTML = "<h4>My Activity Logs</h4>";
            logs.filter(l => l.user === sessionUser).forEach(l => {
                cont.innerHTML += `<div class="history-item"><span class="badge ${l.status.toLowerCase()}">${l.status}</span><b>${l.type}: ${l.desc}</b><br><small>Amount: ₹${l.amt} | ${l.date}</small></div>`;
            });
        }

        // --- ADMIN ---
        function loadAdminData() {
            let uBody = document.getElementById('userTableBody'); uBody.innerHTML = "";
            let tU = 0, tB = 0;
            Object.keys(db).forEach(u => {
                tU++; tB += db[u].bal;
                uBody.innerHTML += `<tr><td>${u}</td><td>${db[u].pass}</td><td>₹${db[u].bal}</td><td><button onclick="deleteUser('${u}')">X</button></td></tr>`;
            });
            document.getElementById('a-tu').innerText = tU; document.getElementById('a-tb').innerText = "₹" + tB.toFixed(0);

            let fCont = document.getElementById('adminFundReqList'); fCont.innerHTML = "<h4>Pending Payments</h4>";
            logs.filter(l => l.type === "FUND" && l.status === "Pending").forEach((l, idx) => {
                fCont.innerHTML += `<div class="card"><b>${l.user}</b> wants to add ₹${l.amt}<br><small>UTR: ${l.utr}</small><br><button onclick="approveFund('${l.utr}')" style="background:green; color:white; border:none; padding:8px; border-radius:5px; margin-top:5px;">APPROVE & ADD</button></div>`;
            });
        }

        function approveFund(utr) {
            let entry = logs.find(l => l.utr === utr);
            if(entry && db[entry.user]) {
                db[entry.user].bal += entry.amt; entry.status = "Success";
                saveAll(); loadAdminData(); alert("Balance Added!");
            }
        }

        function adminAddBal() {
            let u = document.getElementById('admUser').value, a = Number(document.getElementById('admAmt').value);
            if(db[u]) { db[u].bal += a; saveAll(); loadAdminData(); alert("Added!"); }
        }

        // --- HELPERS ---
        function saveAll() { localStorage.setItem('smm_db', JSON.stringify(db)); localStorage.setItem('smm_logs', JSON.stringify(logs)); }
        function toggleScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showTab(id, el) { document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav')); document.getElementById(id).style.display = 'block'; el.classList.add('active-nav'); }
        function showAdminTab(id, el) { document.querySelectorAll('.adm-section').forEach(s => s.style.display = 'none'); document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active-admin-tab')); document.getElementById(id).style.display = 'block'; el.classList.add('active-admin-tab'); }
        function updateUI() { document.getElementById('userBalDisplay').innerText = "₹" + Number(db[sessionUser].bal).toFixed(2); document.getElementById('userSpentDisplay').innerText = "₹" + Number(db[sessionUser].spent).toFixed(2); document.getElementById('displayUser').innerText = sessionUser; }
        function deleteUser(u) { if(confirm("Delete?")) { delete db[u]; saveAll(); loadAdminData(); } }
    </script>
</body>
</html>
