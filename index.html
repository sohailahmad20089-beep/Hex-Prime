<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Pro Wallet Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --accent: #22c55e; --error: #ef4444; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }

        /* Wallet Section Style */
        .wallet-header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 25px; border-radius: 20px; border: 1px solid #334155; text-align: center; margin-bottom: 20px; position: relative; overflow: hidden; }
        .wallet-header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%); }
        .bal-label { font-size: 14px; color: #94a3b8; margin-bottom: 5px; }
        .bal-amount { font-size: 38px; font-weight: 900; color: var(--primary); }
        .add-btn { margin-top: 15px; background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; font-size: 12px; color: #94a3b8; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; }
        
        .buy-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Modal Popup for Fund Add */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; position: relative; text-align: center; border: 1px solid #334155; }
        .qr-frame { background: white; padding: 10px; display: inline-block; border-radius: 10px; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-header">
        <div class="bal-label">My Wallet Balance</div>
        <div class="bal-amount">₹<span id="displayBalance">0.00</span></div>
        <button class="add-btn" onclick="toggleModal(true)"><i class="fas fa-plus-circle"></i> Add Funds</button>
    </div>

    <div class="card">
        <label>TARGET LINK</label>
        <input type="text" id="targetLink" placeholder="Instagram/YouTube Link">

        <label>SELECT SERVICE</label>
        <select id="serviceSelect" onchange="updatePrice()">
            <option value="">-- Choose Package --</option>
            <option value='{"name":"1k Insta Views","price":4}'>Instagram 1k Views - ₹4</option>
            <option value='{"name":"1k Insta Followers","price":35}'>Instagram 1k Followers - ₹35</option>
            <option value='{"name":"1k YT Views","price":70}'>YouTube 1k Views - ₹70</option>
        </select>

        <div style="text-align: center; margin: 15px 0; font-size: 18px; font-weight: bold; color: var(--primary);">
            Cost: ₹<span id="costDisplay">0</span>
        </div>

        <button class="buy-btn" id="orderBtn" onclick="processOrder()">Order Now (Use Wallet)</button>
    </div>
</div>

<div class="modal" id="fundModal">
    <div class="modal-content">
        <h3 style="margin-top:0">Add Money</h3>
        <input type="number" id="fundAmount" placeholder="Enter Amount (₹)" oninput="generateQR()" style="margin-bottom:10px">
        
        <div class="qr-frame">
            <img id="fundQR" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=7388720012@fam" style="width:150px">
        </div>
        
        <p style="font-size:11px; color:#94a3b8">Scan & Pay via any UPI App</p>
        
        <input type="number" id="fundUTR" placeholder="Enter 12-Digit UTR Number">
        <button class="buy-btn" onclick="submitFund()" style="background:var(--primary); margin-top:15px">Verify & Update</button>
        <button onclick="toggleModal(false)" style="background:none; border:none; color:#94a3b8; margin-top:10px; cursor:pointer">Cancel</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5X_B8qqh8GxY-uq1xGxb3DcPQ4c82ZgLxJh0HqjJVhPucfS7r2aB-QDMGuUUy-ZxhmA/exec";

    // 1. Initial Balance Load (Local Storage for instant feel)
    let currentBalance = parseFloat(localStorage.getItem("smm_balance") || "0");
    document.getElementById("displayBalance").innerText = currentBalance.toFixed(2);

    function toggleModal(show) {
        document.getElementById("fundModal").style.display = show ? "flex" : "none";
    }

    function generateQR() {
        const amt = document.getElementById("fundAmount").value || "0";
        const upi = `upi://pay?pa=7388720012@fam&am=${amt}&cu=INR&tn=AddWallet`;
        document.getElementById("fundQR").src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(upi)}`;
    }

    function updatePrice() {
        const s = document.getElementById("serviceSelect").value;
        if(s) {
            const data = JSON.parse(s);
            document.getElementById("costDisplay").innerText = data.price;
        }
    }

    // 2. Fund Add Logic
    async function submitFund() {
        const amt = parseFloat(document.getElementById("fundAmount").value);
        const utr = document.getElementById("fundUTR").value.trim();

        if(!amt || utr.length !== 12) return alert("Sahi Amount aur 12-digit UTR daalein!");

        alert("Request sent! Checking your payment... ⏳");
        
        // Simulation for now (Real connection needs Backend Sync)
        // Testing ke liye balance badha rahe hain
        currentBalance += amt;
        saveBalance();
        toggleModal(false);
        alert(`₹${amt} added to your wallet!`);
    }

    // 3. Order Process (Paisa Katna)
    async function processOrder() {
        const link = document.getElementById("targetLink").value.trim();
        const sVal = document.getElementById("serviceSelect").value;
        
        if(!link || !sVal) return alert("Pehle details fill karein!");

        const service = JSON.parse(sVal);

        // Balance Check
        if(currentBalance < service.price) {
            alert("❌ Inadequate Balance! Please add funds first.");
            toggleModal(true);
            return;
        }

        // Paisa Kato (Logic)
        if(confirm(`Confirm order for ₹${service.price}?`)) {
            currentBalance -= service.price;
            saveBalance();
            
            // Send Order to Sheet (Silent)
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ link: link, service: service.name, price: service.price, utr: 'Wallet_Payment' })
            });

            alert("✅ Order Placed! Balance updated.");
        }
    }

    function saveBalance() {
        localStorage.setItem("smm_balance", currentBalance);
        document.getElementById("displayBalance").innerText = currentBalance.toFixed(2);
    }
</script>
</body>
</html>
