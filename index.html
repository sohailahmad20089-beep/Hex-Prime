<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ssmbyas Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fb;
}

.container {
    max-width: 400px;
    margin: 80px auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

h2 {
    text-align: center;
    color: #4f46e5;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

button:hover {
    background: #4338ca;
}
</style>
</head>

<body>

<div class="container">
    <h2>ssmbyas</h2>

    <!-- NO POST METHOD -->
    <form action="dashboard.html">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>

        <!-- Direct redirect button -->
        <button type="submit">Sign In</button>
    </form>
</div>

</body>
</html>
