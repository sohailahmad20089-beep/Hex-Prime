<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Pro Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #fff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .screen { display: none; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; }
        .active { display: block; }
        
        /* Icon Grid like Image */
        .icon-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
        .icon-item { background: #f1f5f9; padding: 12px; border-radius: 10px; text-align: center; color: var(--primary); font-size: 18px; cursor: pointer; transition: 0.3s; }
        .icon-item:hover { background: var(--primary); color: white; }

        /* Stats Card */
        .stat-card { background: #fff; margin: 10px 15px; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-icon { background: #eef2ff; color: var(--primary); padding: 15px; border-radius: 12px; font-size: 20px; }
        
        /* Admin User Box */
        .admin-box { border: 1px solid #e2e8f0; margin: 15px; border-radius: 15px; padding: 15px; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .pending { background: #fef3c7; color: #92400e; }
        .processing { background: #e0f2fe; color: #0369a1; }
        .completed { background: #dcfce7; color: #166534; }

        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 12px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div id="user-panel" class="screen active">
        <div style="padding: 20px; background: #fff;">
            <h2 style="color:var(--primary); font-weight: 900;">MRSMM.ORG <span style="font-size: 12px; color: #64748b;">CLONE</span></h2>
        </div>

        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-clipboard-list"></i></div>
            <div><small>Panel Orders</small><br><b style="font-size: 18px;">10973190</b></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-wallet"></i></div>
            <div><small>Account Balance</small><br><b style="font-size: 18px;">₹<span id="u-bal">0.00</span></b></div>
        </div>

        <div class="icon-grid">
            <div class="icon-item"><i class="fab fa-tiktok"></i></div>
            <div class="icon-item"><i class="fab fa-instagram"></i></div>
            <div class="icon-item"><i class="fab fa-youtube"></i></div>
            <div class="icon-item"><i class="fab fa-facebook"></i></div>
            <div class="icon-item"><i class="fas fa-plus"></i></div>
        </div>

        <div style="padding: 15px;">
            <div class="card" style="background:#fff; padding: 15px; border-radius: 15px; border: 1px solid #eee;">
                <label><small>Category</small></label>
                <select id="catSelect">
                    <option>TikTok Followers [ Fast Speed ]</option>
                    <option>Instagram Followers [ Real ]</option>
                </select>
                <label><small>Service</small></label>
                <select id="srvSelect" onchange="updatePrice()">
                    <option value="65">3344 - TikTok Followers [ 1M ] - ₹65</option>
                    <option value="2">Insta Views - ₹2</option>
                </select>
                <input type="text" id="orderLink" placeholder="Link: TikTok Username">
                <input type="number" id="orderQty" placeholder="Quantity" oninput="updatePrice()">
                <div style="text-align:right; font-weight: 800; margin-bottom: 10px;">Total: ₹<span id="price">0.00</span></div>
                <button class="btn-main" onclick="placeOrder()">Place Order Now</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div style="background:var(--primary); color:white; padding:20px;">
            <h3>Admin Control Center</h3>
        </div>
        
        <div id="admin-orders-list">
            </div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_NEW_DEPLOY_URL"; // Yahan naya URL dalein
        let db = JSON.parse(localStorage.getItem('smm_db')) || { "suhel": { bal: 500, spent: 0, pass: "123" } };
        let orders = JSON.parse(localStorage.getItem('smm_orders')) || [];
        let sessionUser = "suhel"; // Demo ke liye

        function updatePrice() {
            let rate = document.getElementById('srvSelect').value;
            let qty = document.getElementById('orderQty').value;
            document.getElementById('price').innerText = ((rate/1000)*qty).toFixed(2);
        }

        async function placeOrder() {
            let cost = Number(document.getElementById('price').innerText);
            let srv = document.getElementById('srvSelect').options[document.getElementById('srvSelect').selectedIndex].text;
            let link = document.getElementById('orderLink').value;
            
            if(db[sessionUser].bal < cost) return alert("Paisa kam hai!");

            // Local Update
            db[sessionUser].bal -= cost;
            let newOrder = { 
                id: Date.now(), 
                user: sessionUser, 
                service: srv, 
                link: link, 
                cost: cost, 
                status: "Pending" 
            };
            orders.unshift(newOrder);
            
            // Fix: Sheets Sync
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: "ORDER", ...newOrder })
                });
            } catch(e) { console.log("Sheets offline but local saved"); }

            localStorage.setItem('smm_db', JSON.stringify(db));
            localStorage.setItem('smm_orders', JSON.stringify(orders));
            alert("Order Placed!");
            location.reload();
        }

        // Admin Function to Change Status
        function updateStatus(id, newStatus) {
            let order = orders.find(o => o.id == id);
            if(order) {
                order.status = newStatus;
                localStorage.setItem('smm_orders', JSON.stringify(orders));
                alert("Status Updated to " + newStatus);
                renderAdmin();
            }
        }

        function renderAdmin() {
            let cont = document.getElementById('admin-orders-list');
            cont.innerHTML = "<h4>User Orders Control</h4>";
            orders.forEach(o => {
                cont.innerHTML += `
                <div class="admin-box">
                    <b>User: ${o.user}</b> <span class="status-badge ${o.status.toLowerCase()}">${o.status}</span><br>
                    <small>${o.service}</small><br>
                    <div style="margin-top:10px; display:flex; gap:5px;">
                        <button onclick="updateStatus(${o.id}, 'Processing')" style="font-size:10px;">Process</button>
                        <button onclick="updateStatus(${o.id}, 'Completed')" style="font-size:10px;">Complete</button>
                    </div>
                </div>`;
            });
        }
    </script>
</body>
</html>
