<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growfam - Best SMM Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #3abaf4; --bg: #f4f6f9; --dark: #343a40; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { margin: 0; background: var(--bg); }

        /* --- LOGIN SCREEN (Photo 1) --- */
        .login-bg { background: var(--blue); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .hero-text { color: white; text-align: center; padding: 20px; }
        .hero-text h1 { font-size: 28px; margin-bottom: 10px; }
        .login-card { background: white; width: 90%; max-width: 400px; border-radius: 25px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 20px; }
        .login-card h2 { text-align: center; font-size: 18px; color: #555; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #444; }
        .login-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e0e0e0; background: #f0f9ff; outline: none; }
        .btn-login { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--blue); color: white; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; }

        /* --- ADMIN DASHBOARD (Photo 2) --- */
        .admin-screen { display: none; padding-bottom: 80px; }
        .admin-header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .stat-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 15px; }
        .admin-card { background: white; border: 1px solid #e3e6f0; border-radius: 5px; overflow: hidden; }
        .card-body { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card-body i { font-size: 40px; color: #222; opacity: 0.8; }
        .card-footer { background: #f8f9fc; padding: 10px 15px; border-top: 1px solid #e3e6f0; color: var(--blue); font-size: 13px; display: flex; justify-content: space-between; cursor: pointer; }

        /* Manager Tools */
        .tool-box { background: white; margin: 15px; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
        .btn-action { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; color: white; }

        .active { display: block; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-bg active">
        <div class="hero-text">
            <h1>GROWFAM</h1>
            <p>The Cheapest & Best SMM Panel For RESELLERS</p>
            <a href="#" style="color:white; text-decoration:none; font-weight:700;">Contact Support Team 👉 Click</a>
        </div>
        <div class="login-card">
            <h2>Welcome To Provider Panel</h2>
            <div class="form-group">
                <label><i class="fa fa-user"></i> Username</label>
                <input type="text" id="l-user" class="login-input">
            </div>
            <div class="form-group">
                <label><i class="fa fa-lock"></i> Password</label>
                <input type="password" id="l-pass" class="login-input">
            </div>
            <button class="btn-login" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div id="admin-panel" class="admin-screen">
        <div class="admin-header">
            <h3 style="color:var(--blue); margin:0;">GROWFAM ADMIN</h3>
            <i class="fa fa-bars" onclick="location.reload()"></i>
        </div>

        <div class="stat-grid">
            <div class="admin-card">
                <div class="card-body">
                    <i class="fa fa-users"></i>
                    <div style="text-align:right;"><div id="total-users" style="font-size:24px; font-weight:700;">0</div><small>Registered Users</small></div>
                </div>
                <div class="card-footer" onclick="showSection('user-manage')">See in Detail <i class="fa fa-arrow-circle-right"></i></div>
            </div>

            <div class="admin-card">
                <div class="card-body">
                    <i class="fa fa-shopping-cart"></i>
                    <div style="text-align:right;"><div id="total-orders" style="font-size:24px; font-weight:700;">0</div><small>Total Orders</small></div>
                </div>
                <div class="card-footer" onclick="showSection('order-list')">See in Detail <i class="fa fa-arrow-circle-right"></i></div>
            </div>
        </div>

        <div id="user-manage" class="tool-box">
            <h4>Manage User Funds</h4>
            <input type="text" id="target-user" class="login-input" placeholder="Enter Username" style="margin-bottom:10px;">
            <input type="number" id="fund-amount" class="login-input" placeholder="Amount (₹)">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="manageFund('add')" class="btn-action" style="background:#28a745; flex:1;">Add Fund</button>
                <button onclick="manageFund('del')" class="btn-action" style="background:#dc3545; flex:1;">Deduct Fund</button>
            </div>
        </div>

        <div id="order-list" class="tool-box">
            <h4>Global Order History</h4>
            <div id="full-history" style="font-size:12px; color:#666;">No orders in system.</div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let logs = JSON.parse(localStorage.getItem('smm_logs')) || [];

        function handleLogin() {
            let u = document.getElementById('l-user').value.trim();
            let p = document.getElementById('l-pass').value.trim();

            if(u === "admin" && p === "suhel7388") {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('admin-panel').classList.add('active');
                refreshAdminStats();
            } else {
                alert("Only Admin can access this dashboard!");
            }
        }

        function refreshAdminStats() {
            let users = Object.keys(db);
            document.getElementById('total-users').innerText = users.length;
            document.getElementById('total-orders').innerText = logs.length;

            let historyHtml = logs.map(l => `
                <div style="border-bottom:1px solid #eee; padding:10px 0;">
                    <b>${l.user}</b>: ${l.desc} <br>
                    <small>Amt: ₹${l.amt} | Date: ${l.date}</small>
                </div>
            `).join('');
            document.getElementById('full-history').innerHTML = historyHtml || "No orders yet.";
        }

        function manageFund(type) {
            let user = document.getElementById('target-user').value.trim();
            let amt = parseFloat(document.getElementById('fund-amount').value);

            if(!db[user]) return alert("User not found!");
            if(isNaN(amt)) return alert("Enter valid amount!");

            if(type === 'add') {
                db[user].bal += amt;
                alert(`Added ₹${amt} to ${user}`);
            } else {
                db[user].bal = Math.max(0, db[user].bal - amt);
                alert(`Deducted ₹${amt} from ${user}`);
            }
            localStorage.setItem('smm_db', JSON.stringify(db));
            refreshAdminStats();
        }

        function showSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
