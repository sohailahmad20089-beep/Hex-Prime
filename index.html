<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Pro Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0081ff; --bg: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        .screen { display: none; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; }
        .active { display: block; }
        
        /* Stats & Header */
        .header { display: flex; justify-content: space-between; padding: 15px; background: #fff; border-bottom: 1px solid #eee; }
        .stat-card { background: #fff; margin: 10px 15px; padding: 18px; border-radius: 15px; border: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .stat-icon { color: var(--blue); background: #f0f7ff; padding: 12px; border-radius: 12px; }

        /* Icon Grid */
        .icon-grid { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .icon-item { flex: 0 0 55px; height: 55px; background: #fff; border: 1.5px solid #eee; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        .icon-item.active-icon { border-color: var(--blue); color: var(--blue); background: #f0f7ff; }

        /* Full Width Big Inputs */
        .order-container { padding: 15px; }
        .big-input { width: 100%; padding: 16px; border-radius: 12px; border: 1.5px solid #e0e6ed; box-sizing: border-box; margin-bottom: 15px; font-size: 15px; outline: none; }
        .btn-order { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--blue); color: white; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,129,255,0.3); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; font-size: 11px; color: #999; cursor: pointer; }
        .nav-item.active { color: var(--blue); font-weight: 700; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="padding: 60px 20px;">
            <h1 style="color:var(--blue); font-size:32px; font-weight:900;">Growfansite</h1>
            <div style="margin-top:40px;">
                <input type="text" id="l-user" class="big-input" placeholder="Username">
                <input type="password" id="l-pass" class="big-input" placeholder="Password">
                <button class="btn-order" onclick="doLogin()">Sign in</button>
                <p style="text-align:center; margin-top:20px;">New user? <span style="color:var(--blue); cursor:pointer;" onclick="toggleScreen('signup-screen')">Sign up</span></p>
            </div>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div style="padding: 40px 20px;">
            <h2 style="color:var(--blue)">Register Account</h2>
            <input type="text" id="s-user" class="big-input" placeholder="Username">
            <input type="number" id="s-phone" class="big-input" placeholder="Phone Number">
            <input type="password" id="s-pass" class="big-input" placeholder="Password">
            <button class="btn-order" onclick="doSignup()">Create Account</button>
            <p onclick="toggleScreen('login-screen')" style="text-align:center; margin-top:15px; cursor:pointer;">Back to Login</p>
        </div>
    </div>

    <div id="user-panel" class="screen">
        <div class="header">
            <b style="color:var(--blue); font-size:22px;">MRSMM.ORG</b>
            <i class="fas fa-bars"></i>
        </div>

        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-wallet"></i></div>
            <div><small style="color:#666;">Account balance</small><br><b>₹<span id="u-bal">0.00</span></b></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-coins"></i></div>
            <div><small style="color:#666;">Spent balance</small><br><b>₹<span id="u-spent">0.00</span></b></div>
        </div>

        <div class="icon-grid">
            <div class="icon-item active-icon" onclick="filterSrv('TikTok', this)"><i class="fab fa-tiktok"></i></div>
            <div class="icon-item" onclick="filterSrv('Instagram', this)"><i class="fab fa-instagram"></i></div>
            <div class="icon-item" onclick="filterSrv('YouTube', this)"><i class="fab fa-youtube"></i></div>
            <div class="icon-item" onclick="filterSrv('Telegram', this)"><i class="fab fa-telegram"></i></div>
        </div>

        <div class="order-container">
            <label style="font-size:13px; font-weight:600; margin-left:5px;">Service Category</label>
            <select id="srvSelect" class="big-input" onchange="calcPrice()">
                </select>
            <input type="text" id="orderLink" class="big-input" placeholder="Paste Link Here">
            <input type="number" id="orderQty" class="big-input" placeholder="Quantity (e.g. 10000)" oninput="calcPrice()">
            
            <div style="text-align:center; padding:15px; background:#f0f7ff; border-radius:12px; margin-bottom:20px;">
                <small>Total Charge:</small><br>
                <b id="p-disp" style="font-size:28px; color:var(--blue);">₹0.00</b>
            </div>
            
            <button class="btn-order" onclick="placeOrder()">Place Order Now</button>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><i class="fas fa-shopping-cart"></i><br>New</div>
            <div class="nav-item" onclick="alert('Coming soon')"><i class="fas fa-plus-circle"></i><br>Add Fund</div>
            <div class="nav-item" onclick="alert('History coming soon')"><i class="fas fa-history"></i><br>History</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i><br>Logout</div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div style="background:var(--blue); color:white; padding:20px;">
            <h3>Admin Dashboard</h3>
            <p>Welcome, Suhel Bhai</p>
        </div>
        <div id="admin-content" style="padding:15px;">
            <button class="btn-order" style="background:#333" onclick="location.reload()">Exit Admin</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let sessionUser = null;

        const services = {
            'TikTok': [{n: 'TikTok Views - ₹2 per 1k', p: 2}, {n: 'TikTok Followers', p: 65}],
            'Instagram': [{n: 'Insta Views - ₹1 per 1k', p: 1}, {n: 'Insta Followers', p: 50}],
            'YouTube': [{n: 'YouTube Views - ₹120 per 1k', p: 120}],
            'Telegram': [{n: 'Members - ₹40 per 1k', p: 40}]
        };

        function filterSrv(cat, el) {
            document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('active-icon'));
            el.classList.add('active-icon');
            let sel = document.getElementById('srvSelect');
            sel.innerHTML = services[cat].map(s => `<option value="${s.p}">${s.n}</option>`).join('');
            calcPrice();
        }

        function calcPrice() {
            let rate = document.getElementById('srvSelect').value;
            let qty = document.getElementById('orderQty').value || 0;
            // Formula: (Price / 1000) * Quantity
            let total = (rate / 1000) * qty;
            document.getElementById('p-disp').innerText = "₹" + total.toFixed(2);
        }

        function doSignup() {
            let u = document.getElementById('s-user').value.trim();
            let p = document.getElementById('s-pass').value;
            if(!u || !p) return alert("Fill details");
            db[u] = { pass: p, bal: 0, spent: 0, phone: document.getElementById('s-phone').value };
            localStorage.setItem('smm_db', JSON.stringify(db));
            alert("Signup Success!"); toggleScreen('login-screen');
        }

        function doLogin() {
            let u = document.getElementById('l-user').value.trim();
            let p = document.getElementById('l-pass').value.trim();
            
            // ADMIN LOGIN CHECK
            if(u === "admin" && p === "suhel7388") {
                toggleScreen('admin-panel');
                return;
            }

            if(db[u] && db[u].pass === p) {
                sessionUser = u;
                updateUI();
                toggleScreen('user-panel');
                filterSrv('TikTok', document.querySelector('.icon-item'));
            } else {
                alert("Invalid Login!");
            }
        }

        function placeOrder() {
            let total = Number(document.getElementById('p-disp').innerText.replace('₹',''));
            if(db[sessionUser].bal < total) return alert("Low Balance!");
            db[sessionUser].bal -= total;
            db[sessionUser].spent += total;
            localStorage.setItem('smm_db', JSON.stringify(db));
            updateUI();
            alert("Order Placed Successfully!");
        }

        function toggleScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = db[sessionUser].bal.toFixed(2);
            document.getElementById('u-spent').innerText = db[sessionUser].spent.toFixed(2);
        }
    </script>
</body>
</html>
