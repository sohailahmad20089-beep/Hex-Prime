<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growfansite - Professional SMM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0081ff; --light-blue: #eef6ff; --text: #1e293b; --gray: #94a3b8; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #f8fafc; margin: 0; padding: 0; color: var(--text); }

        .screen { display: none; max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; position: relative; }
        .active { display: block; }

        /* --- LOGIN PAGE (Photo 1) --- */
        .login-header { padding: 40px 20px; text-align: left; }
        .login-header h1 { color: var(--blue); font-size: 28px; font-weight: 800; border-bottom: 3px solid var(--blue); display: inline-block; }
        .input-group { position: relative; margin: 15px 20px; }
        .input-group i { position: absolute; left: 15px; top: 18px; color: var(--blue); font-size: 18px; }
        .login-input { width: 100%; padding: 18px 18px 18px 45px; border-radius: 15px; border: 1px solid #e2e8f0; font-size: 15px; outline: none; }
        .login-btn { background: var(--blue); color: white; width: calc(100% - 40px); margin: 20px; padding: 18px; border: none; border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .login-footer-img { width: 100%; margin-top: 20px; display: block; }

        /* --- DASHBOARD (Photo 2 & 3) --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .top-bar h2 { color: var(--blue); margin: 0; font-size: 20px; }
        
        .balance-container { padding: 15px; }
        .bal-card { background: white; border: 1px solid #f1f5f9; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .bal-icon { width: 45px; height: 45px; background: var(--light-blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--blue); font-size: 20px; }
        .bal-info small { color: var(--gray); font-size: 12px; font-weight: 600; }
        .bal-info div { font-size: 18px; font-weight: 800; }

        /* Icon Categories */
        .cat-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
        .cat-icon { min-width: 50px; height: 50px; border: 1.5px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gray); cursor: pointer; }
        .cat-icon.active { border-color: var(--blue); color: var(--blue); background: var(--light-blue); }

        /* Order Form */
        .order-box { margin: 10px 15px; padding: 20px; border: 1px solid #f1f5f9; border-radius: 20px; }
        .form-label { font-size: 12px; font-weight: 700; color: var(--gray); margin-bottom: 8px; display: block; }
        .order-input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; }
        
        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #f1f5f9; z-index: 100; }
        .nav-btn { text-align: center; color: var(--gray); font-size: 10px; font-weight: 600; cursor: pointer; flex: 1; }
        .nav-btn i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-btn.active { color: var(--blue); }

        /* Admin Badge */
        .admin-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; background: #000; color: #fff; padding: 2px 8px; border-radius: 10px; cursor: pointer;}
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="login-header">
            <h1>Growfansite</h1>
        </div>
        <div class="input-group">
            <i class="fa-regular fa-user"></i>
            <input type="text" id="l-user" class="login-input" placeholder="Username">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="l-pass" class="login-input" placeholder="Password">
        </div>
        <div style="display:flex; justify-content:space-between; padding:0 25px; font-size:13px; color:var(--blue); font-weight:600;">
            <label style="color:var(--gray)"><input type="checkbox"> Remember me</label>
            <span>Forgot password?</span>
        </div>
        <button class="login-btn" onclick="doLogin()">Sign in</button>
        <p style="text-align:center; font-size:14px; color:var(--gray);">Do not have an account? <span style="color:var(--blue); font-weight:700;" onclick="toggleScreen('signup-screen')">Sign up</span></p>
        
        <img src="https://i.ibb.co/hR78m0P/login-footer.png" class="login-footer-img" alt="Support Image">
    </div>

    <div id="signup-screen" class="screen">
        <div class="login-header"><h1>Register</h1></div>
        <div class="input-group"><i class="fa-regular fa-user"></i><input type="text" id="s-user" class="login-input" placeholder="Username"></div>
        <div class="input-group"><i class="fa-solid fa-lock"></i><input type="password" id="s-pass" class="login-input" placeholder="Password"></div>
        <button class="login-btn" onclick="doSignup()">Create Account</button>
        <p style="text-align:center;" onclick="toggleScreen('login-screen')">Already have an account? Sign in</p>
    </div>

    <div id="user-panel" class="screen">
        <div class="top-bar">
            <h2>MRSMM.ORG</h2>
            <i class="fa-solid fa-bars" style="font-size:20px;"></i>
        </div>

        <div class="balance-container">
            <div class="bal-card">
                <div class="bal-icon"><i class="fa-solid fa-wallet"></i></div>
                <div class="bal-info">
                    <small>Account balance</small>
                    <div>₹<span id="u-bal">0.00</span></div>
                </div>
            </div>
            <div class="bal-card">
                <div class="bal-icon"><i class="fa-solid fa-coins"></i></div>
                <div class="bal-info">
                    <small>Spent balance</small>
                    <div>₹<span id="u-spent">0.00</span></div>
                </div>
            </div>
        </div>

        <div class="cat-scroll">
            <div class="cat-icon active" onclick="selCat('tiktok', this)"><i class="fa-brands fa-tiktok"></i></div>
            <div class="cat-icon" onclick="selCat('insta', this)"><i class="fa-brands fa-instagram"></i></div>
            <div class="cat-icon" onclick="selCat('youtube', this)"><i class="fa-brands fa-youtube"></i></div>
            <div class="cat-icon" onclick="selCat('facebook', this)"><i class="fa-brands fa-facebook"></i></div>
            <div class="cat-icon" onclick="selCat('telegram', this)"><i class="fa-brands fa-telegram"></i></div>
        </div>

        <div class="order-box">
            <label class="form-label">Service Category</label>
            <select id="srvSelect" class="order-input" onchange="calcPrice()">
                <option value="0.07" data-id="1798">Insta Views [Ultra Fast]</option>
                <option value="45" data-id="3165">Followers [365 Days Refill]</option>
            </select>

            <label class="form-label">Link</label>
            <input type="text" id="orderLink" class="order-input" placeholder="Paste link here">

            <label class="form-label">Quantity</label>
            <input type="number" id="orderQty" class="order-input" placeholder="0" oninput="calcPrice()">

            <div style="text-align:center; margin:15px 0;">
                <small style="color:var(--gray); font-weight:700;">Charge:</small>
                <div style="font-size:24px; font-weight:800; color:var(--blue);" id="p-disp">₹0.00</div>
            </div>

            <button class="login-btn" style="margin:0; width:100%; shadow: 0 4px 15px rgba(0,129,255,0.3);" onclick="placeOrder()">Place Order</button>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn active"><i class="fa-solid fa-cart-shopping"></i>New</div>
            <div class="nav-btn" onclick="alert('WhatsApp pe contact karein fund add karne ke liye!')"><i class="fa-solid fa-circle-plus"></i>Add Fund</div>
            <div class="nav-btn" onclick="renderHistory()"><i class="fa-solid fa-clock-rotate-left"></i>History</div>
            <div class="nav-btn" onclick="location.reload()"><i class="fa-solid fa-user"></i>Logout</div>
        </div>
    </div>

    <script>
        // Yahan aapka wahi logic aayega jo pehle diya tha (Admin login, API call, Balance management)
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let config = JSON.parse(localStorage.getItem('smm_config')) || { margin: 1.5 };
        let sessionUser = null;

        function doLogin() {
            let u = document.getElementById('l-user').value.trim(), p = document.getElementById('l-pass').value.trim();
            if(u === "admin" && p === "suhel7388") { alert("Admin mode coming soon!"); return; }
            if(db[u] && db[u].pass === p) { sessionUser = u; updateUI(); toggleScreen('user-panel'); }
            else alert("Ghalat details!");
        }

        function doSignup() {
            let u = document.getElementById('s-user').value.trim(), p = document.getElementById('s-pass').value.trim();
            if(u && p) { db[u] = {pass:p, bal:0, spent:0}; localStorage.setItem('smm_db', JSON.stringify(db)); alert("Done!"); toggleScreen('login-screen'); }
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = db[sessionUser].bal.toFixed(2);
            document.getElementById('u-spent').innerText = (db[sessionUser].spent || 0).toFixed(2);
        }

        function toggleScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        function selCat(name, el) {
            document.querySelectorAll('.cat-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            // Yahan aap filtering logic add kar sakte hain
        }

        function calcPrice() {
            let base = document.getElementById('srvSelect').value;
            let qty = document.getElementById('orderQty').value || 0;
            document.getElementById('p-disp').innerText = "₹" + ((base * config.margin / 1000) * qty).toFixed(2);
        }
    </script>
</body>
</html>
