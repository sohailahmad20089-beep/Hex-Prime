<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growfam Pro | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0061ff;
            --secondary: #60efff;
            --glass: rgba(255, 255, 255, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #001f3f, #0061ff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }
        h2 { font-weight: 700; margin-bottom: 10px; font-size: 28px; letter-spacing: 1px; }
        p { font-size: 13px; color: #ddd; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; position: relative; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #fff; }
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--secondary); background: rgba(255,255,255,0.2); }
        .input-group input::placeholder { color: #eee; font-size: 13px; }

        .btn-action {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-action:active { transform: scale(0.98); }

        .toggle-link { margin-top: 20px; font-size: 13px; color: #ccc; }
        .toggle-link b { color: var(--secondary); cursor: pointer; }

        /* OTP Section Style */
        #otp-overlay {
            display: none;
            margin-top: 15px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }
        .error-msg { color: #ff4d4d; font-size: 11px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="container" id="login-box">
        <h2>Welcome Back</h2>
        <p>Login to manage your SMM orders</p>
        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" id="l-user" placeholder="Username or Email">
        </div>
        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" id="l-pass" placeholder="Password">
        </div>
        <button class="btn-action" onclick="handleLogin()">SIGN IN</button>
        <div class="toggle-link">Naya account chahiye? <b onclick="toggleForm('reg')">Register</b></div>
    </div>

    <div class="container" id="reg-box" style="display:none;">
        <h2>Join Growfam</h2>
        <p>Sirf real Gmail se account banega</p>
        
        <div id="main-reg-inputs">
            <div class="input-group">
                <i class="fa fa-user"></i>
                <input type="text" id="r-user" placeholder="Choose Username">
            </div>
            <div class="input-group">
                <i class="fa fa-envelope"></i>
                <input type="email" id="r-email" placeholder="Real Gmail Address" oninput="validateEmailFormat(this)">
                <div id="email-error" class="error-msg">Sahi Gmail format daalein!</div>
            </div>
            <div class="input-group">
                <i class="fa fa-lock"></i>
                <input type="password" id="r-pass" placeholder="Create Password">
            </div>
            <button class="btn-action" id="otp-btn" onclick="sendVerification()">GET OTP</button>
        </div>

        <div id="otp-overlay">
            <p>Verification code aapke Gmail par bheja gaya hai</p>
            <div class="input-group">
                <i class="fa fa-key"></i>
                <input type="number" id="otp-val" placeholder="Enter 6-Digit OTP">
            </div>
            <button class="btn-action" onclick="verifyAndFinish()" style="background: #05cd99;">VERIFY & REGISTER</button>
        </div>

        <div class="toggle-link">Pehle se account hai? <b onclick="toggleForm('login')">Login</b></div>
    </div>

    <script>
        function toggleForm(type) {
            document.getElementById('login-box').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('reg-box').style.display = type === 'reg' ? 'block' : 'none';
        }

        // 1. Email Format Check (Fake rokne ki pehli seedhi)
        function validateEmailFormat(input) {
            const regex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/; // Sirf Gmail allow karega
            const error = document.getElementById('email-error');
            if(!regex.test(input.value)) {
                error.style.display = 'block';
                return false;
            } else {
                error.style.display = 'none';
                return true;
            }
        }

        // 2. OTP Bhejne ka Logic (Isme EmailJS connect karein)
        function sendVerification() {
            const email = document.getElementById('r-email').value;
            if(!validateEmailFormat(document.getElementById('r-email'))) {
                return alert("Kripya sahi Gmail daalein!");
            }
            
            // Yahan animation aur OTP sending logic aayega
            document.getElementById('otp-btn').innerText = "Sending...";
            
            // Dummy logic for demo (Asali ke liye EmailJS use karein)
            setTimeout(() => {
                document.getElementById('main-reg-inputs').style.display = 'none';
                document.getElementById('otp-overlay').style.display = 'block';
            }, 1500);
        }

        function verifyAndFinish() {
            const code = document.getElementById('otp-val').value;
            if(code.length === 6) {
                alert("Account Successfully Verified!");
                location.reload();
            } else {
                alert("Ghalat OTP!");
            }
        }
    </script>
</body>
</html>
