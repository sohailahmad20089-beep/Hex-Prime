<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Direct API Test</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .test-box { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #334155; background: #0b0f1a; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:disabled { background: #475569; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; color: #94a3b8; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="test-box">
    <h2 style="color:var(--primary); margin-bottom:10px;">API Direct Test</h2>
    <p style="font-size:12px; color:#94a3b8;">Service: Insta Views (ID: 9259)</p>
    
    <input type="text" id="orderLink" placeholder="Paste Instagram Link Here">
    <input type="number" id="orderQty" value="1000">
    
    <button id="testBtn" onclick="runTest()">🚀 SEND ORDER TO STAROFSMM</button>
    
    <div id="status">Ready to test...</div>
</div>

<script>
    // Aapka naya URL maine yahan set kar diya hai
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxe-LGDY8KJBUzTUz0zBdp6wVabud0uluLdqnb7SXy6cVRzEHBcZ5hftlnIkDzTTypiYQ/exec";

    async function runTest() {
        const link = document.getElementById("orderLink").value.trim();
        const qty = document.getElementById("orderQty").value;
        const btn = document.getElementById("testBtn");
        const status = document.getElementById("status");

        if(!link) return alert("Bhai pehle link toh daalo!");

        btn.disabled = true;
        btn.innerText = "Connecting API... ⏳";
        status.innerText = "Request bhej raha hoon...";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // Direct post for testing
                body: JSON.stringify({
                    serviceID: 9259,
                    link: link,
                    quantity: qty
                })
            });

            // Note: no-cors mein response body nahi dikhti, par order chala jata hai
            status.innerHTML = "✅ Request Sent!<br>Ab **StarOfSMM** dashboard check karein.";
            alert("Order Request Bhej di gayi hai! StarOfSMM mein 'Orders' page check karein.");
            
        } catch(e) {
            status.innerText = "❌ Error: " + e.message;
            alert("Kuch gadbad hui! Script check karein.");
        }
        
        btn.disabled = false;
        btn.innerText = "🚀 SEND ORDER TO STAROFSMM";
    }
</script>

</body>
</html>
