<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growfam - Professional SMM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0081ff; --bg: #f8fafc; --white: #ffffff; --gray: #94a3b8; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 80px; }
        .screen { display: none; max-width: 480px; margin: 0 auto; min-height: 100vh; background: white; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .active { display: block; }

        /* Dashboard Cards */
        .card-row { padding: 15px; display: grid; grid-template-columns: 1fr; gap: 10px; }
        .stat-card { background: white; border: 1px solid #f1f5f9; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-icon { width: 45px; height: 45px; background: #eef6ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--blue); font-size: 20px; }
        .stat-val { font-size: 18px; font-weight: 800; margin: 0; }
        .stat-label { font-size: 11px; color: var(--gray); font-weight: 600; }

        /* Service Icons Row */
        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .cat-icon { min-width: 50px; height: 50px; border: 1.5px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gray); cursor: pointer; }
        .cat-icon.active-cat { border-color: var(--blue); color: var(--blue); background: #eef6ff; }

        /* Inputs & Buttons */
        .order-box { margin: 10px 15px; padding: 20px; border: 1px solid #f1f5f9; border-radius: 20px; }
        .input-box { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; outline: none; font-size: 14px; }
        .btn-blue { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--blue); color: white; font-weight: 700; cursor: pointer; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: var(--gray); font-size: 10px; font-weight: 700; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div id="user-panel" class="screen active">
        <div style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9;">
            <b style="color:var(--blue); font-size:20px;">GROWFAM</b>
            <i class="fa-solid fa-bars" onclick="showAdmin()"></i>
        </div>

        <div class="card-row">
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-list-check"></i></div>
                <div><p class="stat-val">10973190</p><p class="stat-label">Panel orders</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-wallet"></i></div>
                <div><p class="stat-val">₹<span id="u-bal">0.00</span></p><p class="stat-label">Account balance</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-coins"></i></div>
                <div><p class="stat-val">₹<span id="u-spent">0.00</span></p><p class="stat-label">Spent balance</p></div>
            </div>
        </div>

        <div class="cat-scroll">
            <div class="cat-icon active-cat" onclick="selCat('tiktok', this)"><i class="fa-brands fa-tiktok"></i></div>
            <div class="cat-icon" onclick="selCat('insta', this)"><i class="fa-brands fa-instagram"></i></div>
            <div class="cat-icon" onclick="selCat('youtube', this)"><i class="fa-brands fa-youtube"></i></div>
            <div class="cat-icon" onclick="selCat('facebook', this)"><i class="fa-brands fa-facebook"></i></div>
            <div class="cat-icon" onclick="selCat('telegram', this)"><i class="fa-brands fa-telegram"></i></div>
        </div>

        <div class="order-box">
            <label style="font-size:11px; font-weight:700; color:var(--gray);">Category</label>
            <select id="catSelect" class="input-box" onchange="updateServices()">
                <option value="tiktok">TikTok Services</option>
                <option value="insta">Instagram Services</option>
                <option value="youtube">YouTube Services</option>
            </select>
            
            <label style="font-size:11px; font-weight:700; color:var(--gray);">Service</label>
            <select id="srvSelect" class="input-box" onchange="calcPrice()"></select>
            
            <input type="text" id="orderLink" class="input-box" placeholder="Link">
            <input type="number" id="orderQty" class="input-box" placeholder="Quantity" oninput="calcPrice()">

            <div style="text-align:center; padding:10px;">
                <small style="color:var(--gray);">Charge:</small>
                <div style="font-size:24px; font-weight:800; color:var(--blue);" id="p-disp">₹0.00</div>
            </div>
            <button class="btn-blue" onclick="placeOrder()">Place Order</button>
        </div>

        <div class="nav">
            <div class="nav-item active"><i class="fa-solid fa-cart-shopping"></i>New Order</div>
            <div class="nav-item" onclick="alert('WhatsApp support se fund add karein!')"><i class="fa-solid fa-plus-circle"></i>Add Fund</div>
            <div class="nav-item"><i class="fa-solid fa-history"></i>History</div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div style="padding:20px; background:var(--blue); color:white;">
            <h3>Admin Dashboard</h3>
            <p>User Balance & Profit Control</p>
        </div>
        <div class="order-box">
            <h4>Manage User Funds</h4>
            <input type="text" id="target-user" class="input-box" placeholder="Target Username">
            <input type="number" id="fund-amount" class="input-box" placeholder="Amount (₹)">
            <button class="btn-blue" style="background:#28a745;" onclick="manageFund('add')">Add Money ✅</button>
            <button class="btn-blue" style="background:#dc3545; margin-top:10px;" onclick="manageFund('del')">Deduct Money ❌</button>
        </div>
        <button class="btn-blue" style="margin:20px; width:90%; background:#64748b;" onclick="toggleScreen('user-panel')">Back to Dashboard</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('smm_db')) || { 'Suhel': {pass:'123', bal:1000, spent:0} };
        let sessionUser = 'Suhel';
        const PROFIT = 1.5; // 50% Profit

        const services = {
            'tiktok': [{n:'TikTok Followers', r:2}, {n:'TikTok Views', r:0.1}],
            'insta': [{n:'Instagram Likes', r:5}, {n:'Instagram Followers', r:25}],
            'youtube': [{n:'YouTube Subscribers', r:150}]
        };

        function selCat(cat, el) {
            document.querySelectorAll('.cat-icon').forEach(i => i.classList.remove('active-cat'));
            el.classList.add('active-cat');
            document.getElementById('catSelect').value = cat;
            updateServices();
        }

        function updateServices() {
            let cat = document.getElementById('catSelect').value;
            let srvSelect = document.getElementById('srvSelect');
            srvSelect.innerHTML = services[cat].map(s => `<option value="${s.r * 85 * PROFIT}">${s.n} (₹${(s.r * 85 * PROFIT).toFixed(2)})</option>`).join('');
            calcPrice();
        }

        function calcPrice() {
            let rate = document.getElementById('srvSelect').value;
            let qty = document.getElementById('orderQty').value || 0;
            document.getElementById('p-disp').innerText = "₹" + ((rate/1000)*qty).toFixed(2);
        }

        function manageFund(type) {
            let user = document.getElementById('target-user').value.trim();
            let amt = parseFloat(document.getElementById('fund-amount').value);
            if(!db[user]) return alert("User not found!");
            db[user].bal = (type === 'add') ? db[user].bal + amt : Math.max(0, db[user].bal - amt);
            localStorage.setItem('smm_db', JSON.stringify(db));
            alert("Updated!");
            updateUI();
        }

        function showAdmin() {
            let pass = prompt("Enter Admin Password:");
            if(pass === "suhel7388") toggleScreen('admin-panel');
        }

        function toggleScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function updateUI() { document.getElementById('u-bal').innerText = db[sessionUser].bal.toFixed(2); document.getElementById('u-spent').innerText = db[sessionUser].spent.toFixed(2); }

        updateServices();
        updateUI();
    </script>
</body>
</html>
